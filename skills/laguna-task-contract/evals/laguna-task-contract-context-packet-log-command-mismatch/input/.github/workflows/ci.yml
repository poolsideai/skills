name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Type check
        run: bun run typecheck
      - name: Run tests
        run: bun test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-failures
          path: failure.log
